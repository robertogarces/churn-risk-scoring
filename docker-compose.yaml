services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./configs:/app/configs
      - ./artifacts:/app/artifacts
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./configs:/app/configs
      - ./artifacts:/app/artifacts
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0