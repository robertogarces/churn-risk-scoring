defaults:
  - dataset: kaggle
  - _self_

# ── Paths ─────────────────────────────────────────────────
paths:
  raw_data: data/raw/telco_customer_churn.csv
  processed_data: data/processed/churn_features.parquet

# ── Data split ────────────────────────────────────────────
data:
  test_size: 0.2
  val_size: 0.1
  random_state: 42

# ── Business ──────────────────────────────────────────────
business:
  arpu_aud: 64.76
  retention_cost_aud: 15.0
  avg_lifetime_months: 24