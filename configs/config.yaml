defaults:
  - dataset: kaggle
  - model: lightgbm
  - _self_

# ── Paths ─────────────────────────────────────────────────
paths:
  raw_data: data/raw/telco_customer_churn.csv
  processed_data: data/processed/churn_features.parquet
  models: models/
  artifacts: artifacts/
  outputs: data/outputs/
  images: images/

# ── Data split ────────────────────────────────────────────
data:
  test_size: 0.2
  random_state: 42

# ── Tuning ────────────────────────────────────────────────
tuning:
  n_trials: 20

# ── Business ──────────────────────────────────────────────
business:
  arpu_aud: 64.76
  retention_cost_aud: 15.0
  avg_lifetime_months: 24

# ── Risk Scoring ──────────────────────────────────────────
scoring:
  model_name: lightgbm
  top_factors: 3
  thresholds:
    high: 0.6
    medium: 0.3